name: 장학공고 수집 로봇

on:
  schedule:
    # GitHub는 혼잡 시간대(특히 UTC 정각·자정) 예약을 지연·생략할 수 있다 —
    # 2026-07-06 아침 수집 누락의 원인. 홀수 분으로 하루 2회(아침+낮 백업) 예약.
    # 중복 실행은 seen.json이 걸러서 무해 (0건이면 이슈 코멘트만 남음).
    - cron: '41 22 * * *'   # 매일 07:41 KST
    - cron: '41 2 * * *'    # 매일 11:41 KST (아침 실행이 생략됐을 때 백업)
  workflow_dispatch:
  push:
    branches: ['claude/nice-heisenberg-WESq5']
    paths:
      - 'collector/run-collect.txt'   # 이 파일을 수정해 push하면 즉시 수집 (push-to-run)

permissions:
  contents: write
  issues: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: run
        name: 게시판 수집
        run: node collector/collect.mjs

      - name: 수집 상태 저장 (중복 방지 기록)
        run: |
          git config user.name "handaejang-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collector/seen.json data/notices.json
          if ! git diff --cached --quiet; then
            git commit -m "collector: seen state update"
            git push
          fi

      - name: 컨펌용 리포트 이슈 생성
        if: steps.run.outputs.new_count != '0' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🤖 장학공고 수집 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d) (새 공고 ${{ steps.run.outputs.new_count }}건)" \
            --body-file collector/report.md \
            --repo "${{ github.repository }}" \
            --assignee "${{ github.repository_owner }}"

      # 새 공고가 0건이라 리포트를 생략할 때도, 로봇이 정상 실행됐다는 사실은
      # 최근 리포트 이슈에 한 줄 코멘트로 남긴다 (매일 새 이슈를 만들면 소음이라서)
      - name: 0건 실행 알림 (최근 리포트 이슈에 코멘트)
        if: steps.run.outputs.new_count == '0' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last=$(gh issue list --repo "${{ github.repository }}" \
            --search '"장학공고 수집 리포트" in:title' --state open \
            --limit 1 --json number --jq '.[0].number' || true)
          if [ -n "$last" ] && [ "$last" != "null" ]; then
            gh issue comment "$last" --repo "${{ github.repository }}" \
              --body "🤖 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST 수집 로봇 정상 실행 — 새 공고 0건이라 새 리포트는 만들지 않았어요."
          fi
