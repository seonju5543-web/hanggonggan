name: 장학공고 수집 로봇

on:
  schedule:
    # GitHub는 혼잡 시간대(특히 UTC 정각·자정) 예약을 지연·생략할 수 있다 —
    # 2026-07-06 아침 수집 누락의 원인. 홀수 분으로 하루 2회(아침+낮 백업) 예약.
    # 중복 실행은 seen.json이 걸러서 무해 (0건이면 이슈 코멘트만 남음).
    - cron: '41 22 * * *'   # 매일 07:41 KST
    - cron: '41 2 * * *'    # 매일 11:41 KST (아침 실행이 생략됐을 때 백업)
  workflow_dispatch:
  push:
    branches: ['claude/nice-heisenberg-WESq5']
    paths:
      - 'collector/run-collect.txt'   # 이 파일을 수정해 push하면 즉시 수집 (push-to-run)

permissions:
  contents: write
  issues: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: run
        name: 게시판 수집
        run: node collector/collect.mjs

      - name: 정식 등록 자동화 (선조치후보고 — collector/auto-register-config.json으로 on/off)
        run: node collector/auto-register.mjs

      - name: 신규 등록분 양식 원본 자동 확보 (스키마화 대기 큐)
        run: |
          targets=$(node -e "let q;try{q=require('./collector/pending-forms.json')}catch(e){q={items:[]}};console.log(q.items.filter(i=>!i.fetched).map(i=>i.target).join(','))")
          if [ -n "$targets" ]; then
            FORM_TARGETS="$targets" node collector/deepfetch.mjs
            pip install olefile --quiet
            python3 collector/hwp-prvtext.py
            node -e "const fs=require('fs');const p='./collector/pending-forms.json';const q=JSON.parse(fs.readFileSync(p,'utf8'));q.items.forEach(i=>{i.fetched=true});fs.writeFileSync(p,JSON.stringify(q,null,1)+'\n')"
          fi

      - name: 공고 원문 발췌 갱신 (정직 원칙 — 추론 대신 원문 그대로)
        run: node collector/extract-excerpts.mjs --write

      - name: 수집 상태 저장 (중복 방지 기록)
        run: |
          git config user.name "handaejang-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collector/seen.json data/notices.json data/registered.json
          [ -f collector/pending-forms.json ] && git add collector/pending-forms.json
          [ -d collector/extracted ] && git add collector/extracted
          true  # 위 선택 파일이 없어도 저장 단계는 계속된다 (2026-07-19 8회 연속 실패 원인 수정)
          if ! git diff --cached --quiet; then
            git commit -m "collector: seen state update"
            # 다른 로봇이 먼저 push했을 수 있음 — 받아서 얹은 뒤 재시도 (수집분 유실 방지)
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin "${GITHUB_REF_NAME}"
            done
          fi

      - name: 컨펌용 리포트 이슈 생성
        if: steps.run.outputs.new_count != '0' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🤖 장학공고 수집 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d) (새 공고 ${{ steps.run.outputs.new_count }}건)" \
            --body-file collector/report.md \
            --repo "${{ github.repository }}" \
            --assignee "${{ github.repository_owner }}"

      # 새 공고가 0건이라 리포트를 생략할 때도, 로봇이 정상 실행됐다는 사실은
      # 최근 리포트 이슈에 한 줄 코멘트로 남긴다 (매일 새 이슈를 만들면 소음이라서)
      - name: 0건 실행 알림 (최근 리포트 이슈에 코멘트)
        if: steps.run.outputs.new_count == '0' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last=$(gh issue list --repo "${{ github.repository }}" \
            --search '"장학공고 수집 리포트" in:title' --state open \
            --limit 1 --json number --jq '.[0].number' || true)
          if [ -n "$last" ] && [ "$last" != "null" ]; then
            gh issue comment "$last" --repo "${{ github.repository }}" \
              --body "🤖 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST 수집 로봇 정상 실행 — 새 공고 0건이라 새 리포트는 만들지 않았어요."
          fi

      # 로봇이 어떤 단계에서든 실패하면 조용히 멈추지 않고 즉시 알린다
      # (2026-07-17~19 이틀간 8회 연속 실패를 아무도 몰랐던 사고의 재발 방지)
      - name: 🚨 실패 알림 (최근 리포트 이슈에 코멘트)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last=$(gh issue list --repo "${{ github.repository }}" \
            --search '"장학공고 수집 리포트" in:title' --state open \
            --limit 1 --json number --jq '.[0].number' || true)
          if [ -n "$last" ] && [ "$last" != "null" ]; then
            gh issue comment "$last" --repo "${{ github.repository }}" \
              --body "🚨 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST **수집 로봇 실행 실패** — 실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} · 반복되면 Claude 세션에 '로봇 실패 확인해줘'라고 지시하세요."
          fi
