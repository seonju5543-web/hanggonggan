name: 브라우저형 수집 로봇

on:
  schedule:
    # UTC 자정 부근 혼잡 슬롯은 예약이 생략될 수 있어(2026-07-06 누락) 홀수 분 2회로 분산
    - cron: '7 23 * * *'   # 매일 08:07 KST
    - cron: '7 3 * * *'    # 매일 12:07 KST (아침 실행이 생략됐을 때 백업)
  workflow_dispatch:
  push:
    branches: ['claude/nice-heisenberg-WESq5']
    paths:
      - 'collector/run-browser-collect.txt'   # 이 파일을 수정해 push하면 자동 실행

permissions:
  contents: write
  issues: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  browse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm init -y >/dev/null && npm i playwright@1 --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - id: run
        run: node collector/browser-collect.mjs
      - name: 정식 등록 자동화 (선조치후보고 — collector/auto-register-config.json으로 on/off)
        run: node collector/auto-register.mjs collector/browser-report.md
      - name: 신규 등록분 양식 원본 자동 확보 (스키마화 대기 큐)
        run: |
          targets=$(node -e "let q;try{q=require('./collector/pending-forms.json')}catch(e){q={items:[]}};console.log(q.items.filter(i=>!i.fetched).map(i=>i.target).join(','))")
          if [ -n "$targets" ]; then
            FORM_TARGETS="$targets" node collector/deepfetch.mjs
            pip install olefile --quiet
            python3 collector/hwp-prvtext.py
            node -e "const fs=require('fs');const p='./collector/pending-forms.json';const q=JSON.parse(fs.readFileSync(p,'utf8'));q.items.forEach(i=>{i.fetched=true});fs.writeFileSync(p,JSON.stringify(q,null,1)+'\n')"
          fi

      - name: 공고 원문 발췌 갱신 (정직 원칙 — 추론 대신 원문 그대로)
        run: node collector/extract-excerpts.mjs --write
      - name: 결과 저장
        run: |
          git config user.name "handaejang-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collector/seen.json collector/browser-report.md data/notices.json data/registered.json
          [ -f collector/pending-forms.json ] && git add collector/pending-forms.json
          [ -d collector/extracted ] && git add collector/extracted
          true  # 위 선택 파일이 없어도 저장 단계는 계속된다 (2026-07-19 8회 연속 실패 원인 수정)
          if ! git diff --cached --quiet; then
            git commit -m "browser-collector: harvest update"
            # 다른 로봇이 먼저 push했을 수 있음 — 받아서 얹은 뒤 재시도 (수집분 유실 방지)
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin "${GITHUB_REF_NAME}"
            done
          fi
      - name: 리포트 이슈
        if: github.event_name == 'workflow_dispatch' || steps.run.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "🖥 브라우저형 수집 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d) (신규 ${{ steps.run.outputs.new_count }}건)" \
            --body-file collector/browser-report.md \
            --repo "${{ github.repository }}" \
            --assignee "${{ github.repository_owner }}"

      # 실패 시 즉시 알림 (조용한 중단 방지 — 2026-07-19 도입)
      - name: 🚨 실패 알림 (최근 리포트 이슈에 코멘트)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last=$(gh issue list --repo "${{ github.repository }}" \
            --search '"수집 리포트" in:title' --state open \
            --limit 1 --json number --jq '.[0].number' || true)
          if [ -n "$last" ] && [ "$last" != "null" ]; then
            gh issue comment "$last" --repo "${{ github.repository }}" \
              --body "🚨 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST **브라우저형 수집 로봇 실행 실패** — 실행 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} · 반복되면 Claude 세션에 '로봇 실패 확인해줘'라고 지시하세요."
          fi
